<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/style.css" />
    <title>Emissor de Diplomas</title>
  </head>
  <body>
    <header>
      <h1>Emissor de Diplomas</h1>
    </header>
    <main class="container">
      <section class="painel">
        <h2>Enviar Planilha</h2>
        <input type="file" name="arquivoPlanilha " accept=".xls,.xlsx,.csv" />
        <br /><br />
        <button type="button" id="gerarArquivo">Gerar Diplomas</button>
        <button type="button" id="downloadArquivo">
          Baixar Diploma em PDF
        </button>
      </section>
      <section class="preview">
        <h2>Pré-visualização</h2>
        <div id="areaDiploma">O diploma será exibido aqui</div>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
