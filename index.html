<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emissor de Diplomas</title>
  </head>
  <body>
    <header>
      <h1>Emissor de Diplomas</h1>
    </header>
    <main>
      <section>
        <h2>Enviar Planilha</h2>
        <form action="/upload" method="post" enctype="multipart/form-data">
          <input type="file" name="spreadsheet" accept=".xls,xlsx,csv" />
          <button type="submit">Enviar</button>
          <button type="button" id="gerarArquivo">Gerar Diplomas</button>
          <button type="button" id="downloadArquivo">
            Baixar Diploma em PDF
          </button>
        </form>
      </section>
      <section>
        <h2>Pré-visualisação</h2>
      </section>
    </main>

    <footer></footer>
  </body>
</html>
